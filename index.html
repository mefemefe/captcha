<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Easy CAPTCHA</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<button class="theme-toggle" data-theme-toggle aria-label="Toggle theme">
  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
  Theme
</button>

<div class="captcha-widget" id="captcha">
  <div class="captcha-header">
    <div class="instruction">Select all images with</div>
    <div class="topic" id="topic-label">crosswalks</div>
  </div>
  <div class="captcha-grid" id="grid"></div>
  <div class="captcha-footer">
    <div class="footer-actions">
      <button class="icon-btn" id="refresh-btn" title="New challenge" aria-label="Refresh challenge">
        <svg viewBox="0 0 24 24"><path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/><path d="M8 16H3v5"/></svg>
      </button>
      <button class="icon-btn" title="Audio challenge" aria-label="Audio challenge">
        <svg viewBox="0 0 24 24"><path d="M3 18v-6a9 9 0 0 1 18 0v6"/><path d="M21 19a2 2 0 0 1-2 2h-1a2 2 0 0 1-2-2v-3a2 2 0 0 1 2-2h3zM3 19a2 2 0 0 0 2 2h1a2 2 0 0 0 2-2v-3a2 2 0 0 0-2-2H3z"/></svg>
      </button>
      <button class="icon-btn" title="Help" aria-label="Help">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
      </button>
    </div>
    <div class="recaptcha-logo">
      <span class="brand">reCAPTCHA</span>
      <span class="terms">Privacy · Terms</span>
    </div>
    <button class="verify-btn" id="verify-btn">VERIFY</button>
  </div>
</div>

<div class="result-msg" id="result-msg" aria-live="polite"></div>

<div class="controls">
  <span class="section-title">If you're having trouble choose another captcha:</span>
  <div class="presets" id="presets"></div>

</div>

<script src="script.js"></script>
</body>
</html>
